name: Auto Build Subscription

on:
  push:
    paths:
      - 'all_configs.txt'
      - 'build.py'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Run Build Script
      run: python build.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add sub_plain.txt sub_base64.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Update subscription links [skip ci]"
        git push
